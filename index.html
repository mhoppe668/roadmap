<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMSi Product Roadmap — Card Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { min-width: 1280px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #ffffff;
    padding: 32px;
    color: #1A1A1A;
  }
  .page-header { margin-bottom: 20px; }
  .page-header h1 { font-size: 20px; font-weight: 600; color: #1A1A1A; }

  .scroll-wrap {
    overflow-x: auto;
    border: 1px solid #E0E0DC;
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-family: 'DM Sans', sans-serif;
  }

  thead th {
    background: #F7F7F5;
    border-bottom: 2px solid #E0E0DC;
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #888;
    text-align: left;
  }
  thead th:first-child { width: 150px; }

  tbody td {
    vertical-align: top;
    padding: 10px 10px;
    border-bottom: 1px solid #EAEAE6;
    border-right: 1px solid #EAEAE6;
  }
  tbody td:last-child { border-right: none; }

  .product-cell {
    width: 150px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: #ffffff;
    padding: 14px 10px;
    vertical-align: middle;
    letter-spacing: 0.02em;
    line-height: 1.4;
  }

  .cards-cell { background: #F7F7F5; }

  .card {
    background: #ffffff;
    border: 1px solid #EAEAE6;
    border-radius: 6px;
    padding: 14px 14px 12px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    border-left: 4px solid var(--accent-color);
    transition: box-shadow 0.15s ease;
    position: relative;
  }
  .card:last-child { margin-bottom: 0; }
  .card:hover { box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07); }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #1A1A1A;
    line-height: 1.45;
  }

  .status-pill {
    display: inline-block;
    margin-top: 7px;
    padding: 2px 6px;
    border-radius: 20px;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.6;
    white-space: nowrap;
  }
  .s-on-track     { background: #E1F5EE; color: #0F6E56; }
  .s-some-progress{ background: #FAEEDA; color: #854F0B; }
  .s-not-started  { background: #F1EFE8; color: #5F5E5A; }
  .s-at-risk      { background: #FCEBEB; color: #A32D2D; }
  .s-achieved     { background: #EAF3DE; color: #3B6D11; }

  .popover {
    position: fixed;
    z-index: 9999;
    width: 250px;
    background: #fff;
    border: 1px solid #E0E0DC;
    border-radius: 10px;
    padding: 14px 16px;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.12s ease;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
  }
  .popover.visible { opacity: 1; }

  .popover-close {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    font-size: 18px;
    color: #BBB;
    cursor: pointer;
    line-height: 1;
    font-family: inherit;
  }
  .popover-close:hover { color: #555; }

  .popover-title {
    font-size: 13px;
    font-weight: 600;
    color: #1A1A1A;
    padding-right: 22px;
    line-height: 1.45;
  }

  .popover-divider {
    height: 1px;
    background: #F0F0EC;
    margin: 8px 0;
  }

  .popover-status { margin-bottom: 7px; }

  .popover-desc {
    font-size: 11.5px;
    color: #777;
    line-height: 1.6;
  }
  .popover-desc.empty {
    font-style: italic;
    color: #BBB;
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>DMSi Product Roadmap</h1>
</div>

<div class="scroll-wrap">
  <table id="roadmap-table">
    <thead>
      <tr>
        <th>Product</th>
        <th>Q2 2026</th>
        <th>Q3 2026</th>
        <th>Q4 2026</th>
        <th>Q1 2027</th>
        <th>Q2 2027</th>
        <th>Q3 2027</th>
      </tr>
    </thead>
    <tbody id="roadmap-body"></tbody>
  </table>
</div>

<div class="popover" id="popover">
  <button class="popover-close" id="popover-close">&times;</button>
  <div class="popover-title" id="pop-title"></div>
  <div class="popover-divider"></div>
  <div class="popover-status" id="pop-status"></div>
  <div class="popover-desc" id="pop-desc"></div>
</div>

<script>
const QUARTERS = [
  { label: 'Q2 2026', start: new Date('2026-04-01'), end: new Date('2026-06-30') },
  { label: 'Q3 2026', start: new Date('2026-07-01'), end: new Date('2026-09-30') },
  { label: 'Q4 2026', start: new Date('2026-10-01'), end: new Date('2026-12-31') },
  { label: 'Q1 2027', start: new Date('2027-01-01'), end: new Date('2027-03-31') },
  { label: 'Q2 2027', start: new Date('2027-04-01'), end: new Date('2027-06-30') },
  { label: 'Q3 2027', start: new Date('2027-07-01'), end: new Date('2027-09-30') }
];

const WORKSPACE_COLORS = {
  'Agility':                '#0077C8',
  'AI Products':            '#DC4405',
  'API':                    '#78BE20',
  'Data':                   '#545859',
  'DMSi CRM':               '#6B3FA0',
  'Mobile Warehouse Tools': '#00A3A1'
};

const STATUS_CLASSES = {
  'on track':      's-on-track',
  'some progress': 's-some-progress',
  'not started':   's-not-started',
  'at risk':       's-at-risk',
  'achieved':      's-achieved'
};

function getStatusClass(status) {
  return STATUS_CLASSES[(status || '').toLowerCase().trim()] || 's-not-started';
}

function getQuarterIndex(dateStr) {
  const d = new Date(dateStr);
  for (let i = 0; i < QUARTERS.length; i++) {
    if (d >= QUARTERS[i].start && d <= QUARTERS[i].end) return i;
  }
  return -1;
}

const INITIATIVES = [
  { ws: 'Agility',                name: 'Agility Web: Quote to Cash - Phases 1 & 2',            status: 'On track',      desc: '',                                                                                                              end: '2026-09-16' },
  { ws: 'Agility',                name: 'Agility Web: Quote to Cash - Phase 3',                  status: 'Some progress', desc: '',                                                                                                              end: '2026-12-31' },
  { ws: 'Agility',                name: 'Agility Web: Procure to Pay - Phase 1',                 status: 'Some progress', desc: 'Convert classic Agility windows in the Procure to Pay workstream to Agility Web.',                             end: '2027-05-30' },
  { ws: 'AI Products',            name: 'Internal Development Efficiencies',                      status: 'Some progress', desc: '',                                                                                                              end: '2026-12-31' },
  { ws: 'AI Products',            name: 'Agentic AI Beta Order Entry Agent',                      status: 'Some progress', desc: '',                                                                                                              end: '2026-09-30' },
  { ws: 'AI Products',            name: 'Foundational Data and Security',                         status: 'Some progress', desc: '',                                                                                                              end: '2026-07-31' },
  { ws: 'AI Products',            name: 'Sales Reporting Agent',                                  status: 'Not started',   desc: '',                                                                                                              end: '2026-06-30' },
  { ws: 'API',                    name: 'Auth0 for APIs',                                         status: 'Not started',   desc: '',                                                                                                              end: '2026-06-30' },
  { ws: 'API',                    name: 'Implement API Gateway',                                  status: 'Not started',   desc: '',                                                                                                              end: '2026-09-30' },
  { ws: 'API',                    name: 'Tooling for Quicker Public API Development',             status: 'Not started',   desc: '',                                                                                                              end: '2026-12-31' },
  { ws: 'Data',                   name: 'Agility Embedded Dashboards',                            status: 'At risk',       desc: '',                                                                                                              end: '2026-12-31' },
  { ws: 'Data',                   name: 'Phocas',                                                 status: 'Some progress', desc: 'Phocas - Business Analytics, Financial Statements, Budgeting & Forecasting',                                    end: '2026-12-31' },
  { ws: 'Data',                   name: 'BETA - "Data Access" as a Product',                     status: 'Some progress', desc: 'PostgreSQL Server Data Access',                                                                                 end: '2027-03-31' },
  { ws: 'Data',                   name: 'BETA - "Database Replication" as a Product (Kafka)',    status: 'Some progress', desc: 'PostgreSQL Server Data Access',                                                                                 end: '2027-03-31' },
  { ws: 'DMSi CRM',               name: 'v140 Release - Parent-Child Hierarchy & Push Notifications', status: 'Not started', desc: '',                                                                                                           end: '2026-04-30' },
  { ws: 'DMSi CRM',               name: 'MS Graph Outlook Conversion',                           status: 'Not started',   desc: '',                                                                                                              end: '2026-08-15' },
  { ws: 'DMSi CRM',               name: 'IB v6.11 Upgrade & Data Visualizations',                status: 'Not started',   desc: '',                                                                                                              end: '2026-12-31' },
  { ws: 'Mobile Warehouse Tools', name: 'Work order parent unit handling',                        status: 'Some progress', desc: 'Scan a single barcode to track completed parent items, move them in the warehouse, and transfer between branches.', end: '2026-09-30' },
  { ws: 'Mobile Warehouse Tools', name: 'Bulk locations for tagged material',                     status: 'Not started',   desc: '',                                                                                                              end: '2026-11-30' },
  { ws: 'Mobile Warehouse Tools', name: 'Visual Dashboard',                                       status: 'Not started',   desc: 'Visual dashboards that track warehouse status.',                                                                end: '2027-03-08' },
  { ws: 'Mobile Warehouse Tools', name: 'Pick work order components',                             status: 'Not started',   desc: 'Pick input items for work orders, move to shop.',                                                               end: '2027-03-25' }
];

const tbody = document.getElementById('roadmap-body');

Object.keys(WORKSPACE_COLORS).forEach(ws => {
  const items = INITIATIVES.filter(d => d.ws === ws);
  if (!items.length) return;

  const color = WORKSPACE_COLORS[ws];
  const tr = document.createElement('tr');

  const tdProd = document.createElement('td');
  tdProd.className = 'product-cell';
  tdProd.style.background = color;
  tdProd.textContent = ws;
  tr.appendChild(tdProd);

  for (let q = 0; q < 6; q++) {
    const td = document.createElement('td');
    td.className = 'cards-cell';

    items.filter(it => getQuarterIndex(it.end) === q).forEach(it => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--accent-color', color);

      const titleEl = document.createElement('div');
      titleEl.className = 'card-title';
      titleEl.textContent = it.name;
      card.appendChild(titleEl);

      const pill = document.createElement('span');
      pill.className = 'status-pill ' + getStatusClass(it.status);
      pill.textContent = it.status;
      card.appendChild(pill);

      card.addEventListener('click', e => {
        e.stopPropagation();
        openPopover(card, it);
      });

      td.appendChild(card);
    });

    tr.appendChild(td);
  }

  tbody.appendChild(tr);
});

let activeCard = null;
const pop = document.getElementById('popover');
const popClose = document.getElementById('popover-close');
const popTitle = document.getElementById('pop-title');
const popStatus = document.getElementById('pop-status');
const popDesc = document.getElementById('pop-desc');

function openPopover(card, it) {
  if (activeCard === card) { closePopover(); return; }
  activeCard = card;

  popTitle.textContent = it.name;

  const pill = document.createElement('span');
  pill.className = 'status-pill ' + getStatusClass(it.status);
  pill.textContent = it.status;
  popStatus.innerHTML = '';
  popStatus.appendChild(pill);

  if (it.desc && it.desc.trim()) {
    popDesc.textContent = it.desc;
    popDesc.className = 'popover-desc';
  } else {
    popDesc.textContent = 'No description available.';
    popDesc.className = 'popover-desc empty';
  }

  const r = card.getBoundingClientRect();
  let top  = r.bottom + 8;
  let left = r.left;
  if (left + 260 > window.innerWidth)  left = window.innerWidth  - 264;
  if (top  + 160 > window.innerHeight) top  = r.top - 160;
  pop.style.top  = top  + 'px';
  pop.style.left = left + 'px';
  pop.classList.add('visible');
}

function closePopover() {
  pop.classList.remove('visible');
  activeCard = null;
}

popClose.addEventListener('click', closePopover);
document.addEventListener('click', e => {
  if (!pop.contains(e.target) && !e.target.closest('.card')) closePopover();
});
</script>
</body>
</html>
