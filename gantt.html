<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMSi Product Roadmap — Gantt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html { min-width: 1280px; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #FFFFFF; color: #1A1A1A; padding: 28px 32px 48px; }

  .page-header { margin-bottom: 20px; }
  .page-header h1 { font-size: 20px; font-weight: 600; color: #1A1A1A; }

  .gantt-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #E0E0DC; display: inline-block; }

  .gantt-grid {
    display: grid;
    grid-template-columns: 120px 190px 110px 110px 110px 110px 110px 110px;
    width: max-content;
  }

  .gh {
    background: #F7F7F5;
    border-bottom: 2px solid #E0E0DC;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #888;
    padding: 10px 10px;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }
  .gh.center { justify-content: center; }
  .gh.sticky-0 { position: sticky; left: 0; z-index: 4; }
  .gh.sticky-1 { position: sticky; left: 120px; z-index: 3; }

  .product-cell {
    position: sticky;
    left: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    text-align: left;
    padding: 0 10px;
    font-size: 11px;
    font-weight: 600;
    color: #FFFFFF;
    border-bottom: 1px solid #EAEAE6;
    min-height: 38px;
  }

  .init-label {
    position: sticky;
    left: 120px;
    z-index: 1;
    background: #F0EFEB;
    font-size: 11px;
    color: #3A3A3A;
    padding: 0 10px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #E8E7E3;
    min-height: 38px;
    line-height: 1.4;
  }

  .bar-area {
    grid-column: span 6;
    position: relative;
    height: 38px;
    background: #F7F7F5;
    border-bottom: 1px solid #F3F3F0;
  }

  .today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #DC4405;
    opacity: 0.5;
    pointer-events: none;
    z-index: 3;
  }

  .gbar {
    position: absolute;
    height: 22px;
    top: 8px;
    border-radius: 4px;
    opacity: 0.88;
    cursor: pointer;
    transition: opacity 0.12s;
  }
  .gbar:hover { opacity: 1; }

  #popover {
    position: fixed;
    z-index: 9999;
    width: 240px;
    background: #fff;
    border: 1px solid #E0E0DC;
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s ease;
  }
  #popover.visible { opacity: 1; pointer-events: all; }
  #popover .pop-close {
    position: absolute; top: 8px; right: 10px;
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: #BBB; line-height: 1;
  }
  #popover .pop-close:hover { color: #555; }
  #popover .pop-title {
    font-size: 13px; font-weight: 600; color: #1A1A1A;
    padding-right: 22px; margin-bottom: 8px; line-height: 1.4;
  }
  #popover .pop-divider { border: none; border-top: 1px solid #F0F0EC; margin: 6px 0; }
  #popover .pop-desc {
    font-size: 11.5px; color: #777; line-height: 1.6; margin-top: 6px;
  }
  #popover .pop-desc.empty {
    font-style: italic; color: #BBB; font-size: 11px;
  }

  .status-pill {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 20px;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.6;
    white-space: nowrap;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>DMSi Product Roadmap</h1>
</div>

<div class="gantt-wrapper">
  <div class="gantt-grid" id="gantt"></div>
</div>

<div id="popover">
  <button class="pop-close" id="pop-close">&times;</button>
  <div class="pop-title" id="pop-title"></div>
  <hr class="pop-divider">
  <span class="status-pill" id="pop-pill"></span>
  <div class="pop-desc" id="pop-desc"></div>
</div>

<script>
const WINDOW_START = new Date('2026-04-01');
const WINDOW_END   = new Date('2027-09-30');
const TODAY        = new Date('2026-05-15');
const BAR_AREA_W   = 660;

const QUARTERS = [
  { label: 'Q2 2026', start: new Date('2026-04-01'), end: new Date('2026-06-30') },
  { label: 'Q3 2026', start: new Date('2026-07-01'), end: new Date('2026-09-30') },
  { label: 'Q4 2026', start: new Date('2026-10-01'), end: new Date('2026-12-31') },
  { label: 'Q1 2027', start: new Date('2027-01-01'), end: new Date('2027-03-31') },
  { label: 'Q2 2027', start: new Date('2027-04-01'), end: new Date('2027-06-30') },
  { label: 'Q3 2027', start: new Date('2027-07-01'), end: new Date('2027-09-30') },
];

const WS_COLORS = {
  'Agility':                '#0077C8',
  'AI Products':            '#DC4405',
  'API':                    '#78BE20',
  'Data':                   '#545859',
  'DMSi CRM':               '#6B3FA0',
  'Mobile Warehouse Tools': '#00A3A1',
};

const STATUS_STYLES = {
  'on track':      { bg: '#E1F5EE', color: '#0F6E56' },
  'some progress': { bg: '#FAEEDA', color: '#854F0B' },
  'not started':   { bg: '#F1EFE8', color: '#5F5E5A' },
  'at risk':       { bg: '#FCEBEB', color: '#A32D2D' },
  'achieved':      { bg: '#EAF3DE', color: '#3B6D11' },
};
function pillStyle(status) {
  return STATUS_STYLES[(status||'').toLowerCase()] || STATUS_STYLES['not started'];
}

const RAW = [
  { ws:'Agility',               name:'Agility Web: Quote to Cash - Phases 1 & 2',                status:'On track',      desc:'',                                                                                                                                                        start:'2025-01-01', end:'2026-09-16' },
  { ws:'Agility',               name:'Agility Web: Procure to Pay - Phase 1',                    status:'Some progress', desc:'Convert classic Agility windows in the Procure to Pay workstream to Agility Web.',                                                                       start:'2026-10-01', end:'2027-05-30' },
  { ws:'Agility',               name:'Agility Web: Quote to Cash - Phase 3',                     status:'Some progress', desc:'',                                                                                                                                                        start:'2026-09-14', end:'2026-12-31' },
  { ws:'AI Products',           name:'Internal Development Efficiencies',                        status:'Some progress', desc:'',                                                                                                                                                        start:'2026-01-14', end:'2026-12-31' },
  { ws:'AI Products',           name:'Agentic AI Beta Order Entry Agent',                        status:'Some progress', desc:'',                                                                                                                                                        start:'2026-01-01', end:'2026-09-30' },
  { ws:'AI Products',           name:'Foundational Data and Security',                           status:'Some progress', desc:'',                                                                                                                                                        start:'2026-01-01', end:'2026-07-31' },
  { ws:'AI Products',           name:'Sales Reporting Agent',                                    status:'Not started',   desc:'',                                                                                                                                                        start:'2026-03-01', end:'2026-06-30' },
  { ws:'API',                   name:'Auth0 for APIs',                                           status:'Not started',   desc:'',                                                                                                                                                        start:'2026-03-01', end:'2026-06-30' },
  { ws:'API',                   name:'Implement API Gateway',                                    status:'Not started',   desc:'',                                                                                                                                                        start:'2026-07-01', end:'2026-09-30' },
  { ws:'API',                   name:'Tooling for Quicker Public API Development',               status:'Not started',   desc:'',                                                                                                                                                        start:'2026-10-01', end:'2026-12-31' },
  { ws:'Data',                  name:'BETA - "Data Access" as a Product',                        status:'Some progress', desc:'PostgreSQL Server Data Access',                                                                                                                           start:'2026-11-02', end:'2027-03-31' },
  { ws:'Data',                  name:'Phocas',                                                   status:'Some progress', desc:'Phocas - Business Analytics, Financial Statements, Budgeting & Forecasting',                                                                              start:'2026-10-15', end:'2026-12-31' },
  { ws:'Data',                  name:'Agility Embedded Dashboards',                             status:'At risk',       desc:'',                                                                                                                                                        start:'2026-09-14', end:'2026-12-31' },
  { ws:'Data',                  name:'BETA - "Database Replication" as a Product (Kafka)',       status:'Some progress', desc:'PostgreSQL Server Data Access',                                                                                                                           start:'2026-11-02', end:'2027-03-31' },
  { ws:'DMSi CRM',              name:'v140 Release - Parent-Child Hierarchy & Push Notifications', status:'Not started', desc:'',                                                                                                                                                        start:'2026-01-01', end:'2026-04-30' },
  { ws:'DMSi CRM',              name:'MS Graph Outlook Conversion',                              status:'Not started',   desc:'',                                                                                                                                                        start:'2026-02-16', end:'2026-08-15' },
  { ws:'DMSi CRM',              name:'IB v6.11 Upgrade & Data Visualizations',                   status:'Not started',   desc:'',                                                                                                                                                        start:'2026-06-01', end:'2026-12-31' },
  { ws:'Mobile Warehouse Tools',name:'Pick work order components',                              status:'Not started',   desc:'Pick input items for work orders, move to shop.',                                                                                                         start:'2026-12-01', end:'2027-03-25' },
  { ws:'Mobile Warehouse Tools',name:'Visual Dashboard',                                        status:'Not started',   desc:'Visual dashboards that track warehouse status.',                                                                                                          start:'2026-12-01', end:'2027-03-08' },
  { ws:'Mobile Warehouse Tools',name:'Work order parent unit handling',                         status:'Some progress', desc:'Scan a single barcode to track completed parent items, move them in the warehouse, and transfer between branches.',                                        start:'2026-02-18', end:'2026-09-30' },
  { ws:'Mobile Warehouse Tools',name:'Bulk locations for tagged material',                      status:'Not started',   desc:'',                                                                                                                                                        start:'2026-10-01', end:'2026-11-30' },
];

const wsOrder = Object.keys(WS_COLORS);

function dateToMs(d) { return new Date(d).getTime(); }
const winStart = WINDOW_START.getTime();
const winEnd   = WINDOW_END.getTime();
const winSpan  = winEnd - winStart;

const groups = {};
wsOrder.forEach(ws => { groups[ws] = []; });
RAW.forEach(item => {
  if (!groups[item.ws]) return;
  groups[item.ws].push(item);
});

const gantt = document.getElementById('gantt');

function cell(tag, classes, styles) {
  const el = document.createElement(tag);
  if (classes) el.className = classes;
  if (styles) Object.assign(el.style, styles);
  return el;
}

const hProd = cell('div', 'gh sticky-0'); hProd.textContent = 'Product';
const hInit = cell('div', 'gh sticky-1'); hInit.textContent = 'Initiative';
gantt.appendChild(hProd);
gantt.appendChild(hInit);
QUARTERS.forEach(q => {
  const hq = cell('div', 'gh center'); hq.textContent = q.label;
  gantt.appendChild(hq);
});

const todayMs = TODAY.getTime();
const todayX = (todayMs >= winStart && todayMs <= winEnd)
  ? ((todayMs - winStart) / winSpan) * BAR_AREA_W
  : null;

let gridRow = 2;

wsOrder.forEach(ws => {
  const items = groups[ws];
  if (!items || items.length === 0) return;
  const color = WS_COLORS[ws];
  const startRow = gridRow;
  const endRow   = gridRow + items.length;

  const prodCell = cell('div', 'product-cell');
  prodCell.textContent = ws;
  prodCell.style.background = color;
  prodCell.style.gridRow = `${startRow} / ${endRow}`;
  gantt.appendChild(prodCell);

  items.forEach(item => {
    const labelCell = cell('div', 'init-label');
    labelCell.textContent = item.name;
    labelCell.style.gridRow = String(gridRow);
    gantt.appendChild(labelCell);

    const barArea = cell('div', 'bar-area');
    barArea.style.gridRow = String(gridRow);

    if (todayX !== null) {
      const tl = cell('div', 'today-line');
      tl.style.left = todayX + 'px';
      barArea.appendChild(tl);
    }

    const startMs = dateToMs(item.start);
    const endMs   = dateToMs(item.end);

    if (startMs < winEnd && endMs > winStart) {
      const clampedStart = Math.max(startMs, winStart);
      const clampedEnd   = Math.min(endMs, winEnd);
      const leftPct  = (clampedStart - winStart) / winSpan;
      const rightPct = (clampedEnd   - winStart) / winSpan;
      const leftPx   = leftPct  * BAR_AREA_W;
      const widthPx  = Math.max((rightPct - leftPct) * BAR_AREA_W, 8);

      const bar = cell('div', 'gbar');
      bar.style.left       = leftPx + 'px';
      bar.style.width      = widthPx + 'px';
      bar.style.background = color;

      bar.addEventListener('click', function(e) {
        e.stopPropagation();
        openPopover(bar, item);
      });

      barArea.appendChild(bar);
    }

    gantt.appendChild(barArea);
    gridRow++;
  });
});

const popover  = document.getElementById('popover');
const popClose = document.getElementById('pop-close');
const popTitle = document.getElementById('pop-title');
const popPill  = document.getElementById('pop-pill');
const popDesc  = document.getElementById('pop-desc');
let activeBar  = null;

function openPopover(barEl, item) {
  if (activeBar === barEl) { closePopover(); return; }
  activeBar = barEl;

  popTitle.textContent = item.name;

  const ps = pillStyle(item.status);
  popPill.textContent = item.status || 'Not started';
  popPill.style.background = ps.bg;
  popPill.style.color = ps.color;

  if (item.desc && item.desc.trim()) {
    popDesc.textContent = item.desc;
    popDesc.className = 'pop-desc';
  } else {
    popDesc.textContent = 'No description available.';
    popDesc.className = 'pop-desc empty';
  }

  const rect = barEl.getBoundingClientRect();
  let top  = rect.bottom + 8;
  let left = rect.left;
  if (left + 250 > window.innerWidth) left = window.innerWidth - 256;
  if (top + 140 > window.innerHeight) top  = rect.top - 160;
  popover.style.top  = top + 'px';
  popover.style.left = left + 'px';

  popover.classList.add('visible');
}

function closePopover() {
  popover.classList.remove('visible');
  activeBar = null;
}

popClose.addEventListener('click', closePopover);

document.addEventListener('click', function(e) {
  if (!popover.contains(e.target) && !e.target.classList.contains('gbar')) {
    closePopover();
  }
});
</script>
</body>
</html>
